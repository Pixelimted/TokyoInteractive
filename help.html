<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unknown.gg — Help</title>
<meta name="description" content="Frequently asked questions about Unknown, the moderation bot for Unknown RNG.">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c1016; --panel: #151b25; --panel-2: #1a212c; --border: #232b38;
    --text: #ffffff; --text-dim: #9aa5b8; --text-faint: #626e82;
    --emerald: #22c98a; --emerald-dim: #1a9c6b; --emerald-glow: rgba(34,201,138,0.3);
    --red: #ef5a5a; --amber: #f5b942; --purple: #8b7bf0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; -webkit-font-smoothing: antialiased; }
  a { color: inherit; text-decoration: none; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  .site-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px clamp(12px, 3vw, 24px); border-bottom: 1px solid var(--border);
    background: var(--panel-2); position: sticky; top: 0; z-index: 100; gap: 16px;
  }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.05rem; white-space: nowrap; }
  .brand-mark {
    width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
    background: linear-gradient(160deg, var(--emerald), var(--emerald-dim));
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 0.8rem; color: #04140d; box-shadow: 0 0 16px var(--emerald-glow);
  }
  .site-nav-links { display: flex; gap: 22px; font-size: 0.86rem; font-weight: 700; color: var(--text-dim); flex: 1; }
  .site-nav-links a:hover { color: var(--text); }
  .site-nav-links a.current { color: var(--emerald); }
  @media (max-width: 780px) { .site-nav-links { display: none; } }
  .btn {
    padding: 10px 18px; border-radius: 20px; font-size: 0.85rem; font-weight: 800;
    display: inline-flex; align-items: center; gap: 8px; cursor: pointer; border: none;
    transition: filter 0.15s, transform 0.1s; font-family: inherit; white-space: nowrap;
  }
  .btn-action { background: var(--emerald); color: #04140d; box-shadow: 0 0 20px var(--emerald-glow); }
  .btn-action:hover { filter: brightness(1.08); transform: translateY(-1px); }

  .page-wrap { max-width: 780px; margin: 0 auto; padding: clamp(36px, 6vw, 60px) clamp(16px, 4vw, 32px) 80px; }
  .page-wrap h1 { font-size: clamp(1.8rem, 4vw, 2.4rem); font-weight: 900; margin-bottom: 10px; letter-spacing: -0.02em; }
  .page-wrap > p.lead { color: var(--text-dim); font-size: 1rem; font-weight: 600; margin-bottom: 36px; }

  .faq-item { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; overflow: hidden; }
  .faq-q {
    padding: 18px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    gap: 16px; font-weight: 700; font-size: 0.95rem;
  }
  .faq-q .arrow { flex-shrink: 0; transition: transform 0.15s ease; color: var(--emerald); font-size: 1.1rem; }
  .faq-item.open .faq-q .arrow { transform: rotate(45deg); }
  .faq-a { max-height: 0; overflow: hidden; transition: max-height 0.2s ease; }
  .faq-a-inner { padding: 0 20px 18px; color: var(--text-dim); font-size: 0.9rem; line-height: 1.65; font-weight: 500; }
  .faq-a-inner code { font-family: 'JetBrains Mono'; background: var(--bg); border: 1px solid var(--border); padding: 2px 6px; border-radius: 5px; font-size: 0.86em; color: var(--emerald); }

  .contact-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 26px;
    text-align: center; margin-top: 36px;
  }
  .contact-card h3 { font-size: 1.05rem; font-weight: 800; margin-bottom: 8px; }
  .contact-card p { color: var(--text-dim); font-size: 0.88rem; font-weight: 500; margin-bottom: 18px; }

  footer.site-footer {
    border-top: 1px solid var(--border); padding: 22px clamp(12px, 3vw, 24px); display: flex;
    justify-content: space-between; align-items: center; font-size: 0.77rem; color: var(--text-faint);
    flex-wrap: wrap; gap: 10px; font-weight: 600;
  }
  .footer-links { display: flex; gap: 18px; flex-wrap: wrap; }
</style>
</head>
<body>

<nav class="site-nav">
  <div class="brand"><div class="brand-mark">U</div><span>Unknown</span></div>
  <div class="site-nav-links">
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="docs.html">Docs</a>
    <a href="help.html" class="current">Help</a>
  </div>
  <a href="dashboard.html" class="btn btn-action">Open Dashboard</a>
</nav>

<div class="page-wrap">
  <h1>Help &amp; FAQ</h1>
  <p class="lead">Common questions about setting up and using Unknown.</p>

  <div id="faq-list"></div>

  <div class="contact-card">
    <h3>Still stuck?</h3>
    <p>Reach out in the Discord server where you found this bot &mdash; that's the fastest way to get help.</p>
  </div>
</div>

<footer class="site-footer">
  <div>Unknown &mdash; built for Unknown RNG</div>
  <div class="footer-links">
    <a href="docs.html">Docs</a>
    <a href="help.html">Help</a>
    <a href="privacy.html">Privacy</a>
    <a href="terms.html">Terms</a>
    <a href="legal.html">Legal</a>
  </div>
</footer>

<script>
  var FAQ = [
    {
      q: "The dashboard login button does nothing when I click it.",
      a: "Make sure JavaScript isn't blocked for this page, and try a hard refresh. If it still doesn't work, check that your browser allows pop-ups and redirects for this site, since logging in redirects you to Discord and back."
    },
    {
      q: "Why don't I see any servers on the dashboard?",
      a: "The dashboard only shows servers where you have Manage Server permission <strong>and</strong> where Unknown is already a member. If a server is missing, either you don't have that permission there, or the bot hasn't been added to it yet."
    },
    {
      q: "I ran /setup but nothing changed.",
      a: "Every option in <code>/setup</code> is optional. If you ran it with no options filled in, it just shows your current configuration rather than changing anything. Fill in the specific fields you want to update."
    },
    {
      q: "Can moderators use text commands instead of slash commands?",
      a: "Yes, if you've set a prefix. Go to <code>/setup</code> or the dashboard's Configure Bot tab and set a prefix like <code>!</code> or <code>.</code>. Once set, commands like <code>!ban @user reason</code> work identically to their slash command equivalents."
    },
    {
      q: "What does AI Moderation actually do?",
      a: "It's a beta feature that scans messages for patterns like known scam links, slur variants, and mass-mention spam, then posts anything suspicious to a review channel you choose. It never takes action automatically &mdash; a human moderator always makes the final call."
    },
    {
      q: "How does the auto-kick and auto-ban system work?",
      a: "You set two numbers in <code>/setup</code>: how many warnings trigger an automatic kick, and how many trigger an automatic ban. Once a user crosses either threshold, Unknown takes the action itself and logs it as an automatic case."
    },
    {
      q: "Can I run commands in my Roblox game from Discord?",
      a: "Yes. Use <code>/ingame</code> in Discord to see every live Roblox server tied to your game, pick one, and run a Cmdr command inside it directly. The dashboard's Roblox Console tab offers the same thing from a browser."
    },
    {
      q: "Does Unknown store the content of every message?",
      a: "No. Message content is only read for two specific, opt-in features: prefix commands (to see what was typed after the prefix) and AI Moderation (to scan for flagged patterns). If a message doesn't match a prefix and isn't flagged, nothing about it is stored."
    },
    {
      q: "I'm a moderator but commands say I don't have permission.",
      a: "Unknown checks both your assigned mod role <strong>and</strong> your actual Discord permissions. If either one would normally block the action in Discord, the command is blocked too, even with the mod role."
    }
  ];

  var list = document.getElementById('faq-list');
  var html = '';
  for (var i = 0; i < FAQ.length; i++) {
    html += '<div class="faq-item" data-idx="' + i + '">' +
      '<div class="faq-q"><span>' + FAQ[i].q + '</span><span class="arrow">+</span></div>' +
      '<div class="faq-a"><div class="faq-a-inner">' + FAQ[i].a + '</div></div>' +
      '</div>';
  }
  list.innerHTML = html;

  var items = document.querySelectorAll('.faq-item');
  for (var j = 0; j < items.length; j++) {
    items[j].querySelector('.faq-q').addEventListener('click', function () {
      var item = this.parentElement;
      var answer = item.querySelector('.faq-a');
      var isOpen = item.classList.contains('open');

      var allItems = document.querySelectorAll('.faq-item');
      for (var k = 0; k < allItems.length; k++) {
        allItems[k].classList.remove('open');
        allItems[k].querySelector('.faq-a').style.maxHeight = null;
      }

      if (!isOpen) {
        item.classList.add('open');
        answer.style.maxHeight = answer.scrollHeight + 'px';
      }
    });
  }
</script>

</body>
</html>
